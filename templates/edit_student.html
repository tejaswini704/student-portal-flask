<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100%;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    margin: 8px 15px;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 30px;
}

/* FORM CARD */
.form-card {
    background: white;
    padding: 35px;
    border-radius: 15px;
    max-width: 500px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #2a5298;
    box-shadow: 0 0 5px rgba(42,82,152,0.3);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #1e3c72, #2a5298);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 Portal</h2>
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/add">➕ Add Student</a>
    <a href="/view">📋 View Students</a>
    <a href="/manage">⚙️ Manage Students</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="form-card">

        <h2>✏️ Edit Student</h2>

        <form method="POST">

            <!-- FIXED ACCESS (IMPORTANT) -->
            <input type="text" name="name" value="{{ student.name }}" placeholder="Name" required>

            <input type="text" name="roll" value="{{ student.roll }}" placeholder="Roll No" required>

            <input type="text" name="dept" value="{{ student.dept }}" placeholder="Department" required>

            <input type="number" name="marks" value="{{ student.marks }}" placeholder="Marks" required>

            <button type="submit">Update Student</button>

        </form>

    </div>

</div>

</body>
</html>
