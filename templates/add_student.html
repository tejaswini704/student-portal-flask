<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Student</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 240px;
    height: 100%;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
    padding-top: 20px;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    color: white;
    padding: 12px 20px;
    margin: 8px 15px;
    text-decoration: none;
    border-radius: 8px;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.2);
}

/* MAIN */
.main {
    margin-left: 240px;
    padding: 30px;
}

/* CARD */
.card-box {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    max-width: 500px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    box-sizing: border-box;
    transition: 0.3s;
}

input:focus {
    border-color: #28a745;
    box-shadow: 0 0 5px rgba(40,167,69,0.2);
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #218838;
    transform: translateY(-1px);
}

/* FLASH */
.alert {
    margin-left: 260px;
    margin-right: 20px;
}
</style>

</head>

<body>

<!-- FLASH MESSAGE (SAFE + CLEAN) -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
        <div class="alert alert-{{ category }} text-center m-3">
            {{ message }}
        </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>🎓 Portal</h2>
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/add">➕ Add Student</a>
    <a href="/view">📋 View Students</a>
    <a href="/manage">✏️ Manage Students</a>
    <a href="/logout">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

    <div class="card-box">

        <h3 class="mb-4">➕ Add Student</h3>

        <form method="POST" action="/add">

            <input type="text" name="name" placeholder="Full Name" required>

            <input type="text" name="username" placeholder="Username (for login)" required>

            <input type="text" name="roll" placeholder="Roll No" required>

            <input type="text" name="dept" placeholder="Department" required>

            <input type="number" name="marks" placeholder="Marks" required>

            <button type="submit">Add Student</button>

        </form>

    </div>

</div>

</body>
</html>
