<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Marks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

.card-box {
    width: 400px;
    margin: 80px auto;
    padding: 25px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

.back {
    display: inline-block;
    margin-top: 15px;
    text-decoration: none;
    color: white;
    background: #16a34a;
    padding: 8px 15px;
    border-radius: 6px;
}
</style>

</head>
<body>

<div class="card-box">

    <h2>📊 My Marks</h2>

    {% if data %}

        <!-- FIXED: dictionary access instead of index -->
        <p><b>Name:</b> {{ data.name }}</p>
        <p><b>Roll:</b> {{ data.roll }}</p>
        <p><b>Department:</b> {{ data.dept }}</p>
        <p><b>Marks:</b> {{ data.marks }}</p>

        <!-- OPTIONAL SAFE STATUS -->
        {% if data.marks|int >= 40 %}
            <p style="color:green; font-weight:bold;">Status: PASS 🎉</p>
        {% else %}
            <p style="color:red; font-weight:bold;">Status: FAIL ❌</p>
        {% endif %}

    {% else %}
        <p>No marks found</p>
    {% endif %}

    <a href="/student_dashboard" class="back">Back</a>

</div>

</body>
</html>
