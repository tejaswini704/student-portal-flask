<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* LIGHT BACKGROUND */
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #f4f6f9, #e8f0ff);
}

/* BOX */
.register-box {
    width: 380px;
    background: white;
    padding: 30px;
    border: 1px solid #d1d5db;
    border-radius: 14px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.12);
}

/* TITLE */
.register-box h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #111827;
    font-weight: 600;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 11px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: 0.3s;
}

input:focus, select:focus {
    border-color: #16a34a;
    box-shadow: 0 0 6px rgba(22,163,74,0.2);
}

/* GREEN BUTTON */
button {
    width: 100%;
    padding: 11px;
    margin-top: 12px;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #15803d;
    transform: translateY(-1px);
}

/* LINK */
a {
    display: block;
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: #2563eb;
    text-decoration: none;
}

a:hover {
    text-decoration: underline;
}

/* SMALL TEXT STYLE */
small {
    display: block;
    text-align: center;
    margin-top: 10px;
    color: #6b7280;
    font-size: 12px;
}

</style>

</head>

<body>

<div class="register-box">

    <h2>🆕 Sign Up</h2>

    <form method="POST">

        <!-- FIX: clearer meaning -->
        <input type="text" name="username" placeholder="Enter Username" required>

        <input type="password" name="password" placeholder="Enter Password" required>

        <!-- ROLE SELECTION FIXED -->
        <select name="role" required>
            <option value="">Select Role</option>
            <option value="student">Student</option>
            <option value="teacher">Teacher</option>
        </select>

        <button type="submit">Create Account</button>

    </form>

    <a href="/login">Already have an account? Login</a>

    <small>Student Portal System</small>

</div>

</body>
</html>
